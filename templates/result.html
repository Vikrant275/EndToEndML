<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 20px;
        }

        .result-box {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            color: #667eea;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            background: #667eea;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
        }

    </style>
</head>

<body>

    <div class="card">
        <h2>🎯 Prediction Result</h2>

        <!-- Flask variable -->
        <div class="result-box">
            {{ result }}
        </div>

        <p>Your predicted performance based on the given inputs.</p>

        <a href="/" class="btn">🔙 Try Again</a>
    </div>

</body>
</html>

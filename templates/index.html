<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Performance Predictor</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(-45deg, #667eea, #764ba2, #6b8dd6, #8e37d7);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    /* Hero Section */
    .hero {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      padding: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    p {
      max-width: 600px;
      margin-bottom: 30px;
      line-height: 1.6;
      font-size: 18px;
    }

    .btn {
      padding: 12px 30px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #667eea;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* Floating circles animation */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 6s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 20%;
      left: 10%;
    }

    .circle:nth-child(2) {
      width: 120px;
      height: 120px;
      bottom: 15%;
      right: 10%;
      animation-delay: 2s;
    }

    .circle:nth-child(3) {
      width: 60px;
      height: 60px;
      bottom: 30%;
      left: 20%;
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

  </style>
</head>

<body>

  <!-- Animated Background Shapes -->
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">🎓 Predictor</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Student Performance Predictor</h1>
    <p>
      A smart system that analyzes student data to predict academic performance.
      Built with modern technology and designed for simplicity.
    </p>

    <form action="{{ url_for('index') }}" method="POST">
    <button type="submit" class="btn">Explore</button>
    </form>
  </div>

</body>
</html>
